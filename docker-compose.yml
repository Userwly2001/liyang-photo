services:
  postgres:
    image: postgres:16-alpine
    container_name: liyang-photo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: liyang_photo
      POSTGRES_USER: photography
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-sqlwly2026!@#}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network

  app:
    build: .
    container_name: liyang-photo-app
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.local
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://photography:sqlwly2026%21%40%23@postgres:5432/liyang_photo}"
      JWT_SECRET: "${JWT_SECRET:-sqlwly2026!@#}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-dailywang2026!@#}"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://www.leonwang.cc}"
      GOOGLE_SITE_VERIFICATION: "${GOOGLE_SITE_VERIFICATION:-}"
      BING_SITE_VERIFICATION: "${BING_SITE_VERIFICATION:-}"
      BAIDU_SITE_VERIFICATION: "${BAIDU_SITE_VERIFICATION:-}"
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: liyang-photo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - uploads:/var/www/uploads:ro
    depends_on:
      - app
    networks:
      - app_network

volumes:
  postgres_data:
  uploads:

networks:
  app_network:
    driver: bridge

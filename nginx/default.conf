upstream nextjs {
    server app:3000;
    keepalive 64;
}

# Gzip configuration
gzip on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    image/webp
    image/avif;

# Cache zone for static assets
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static:10m max_size=1g inactive=7d use_temp_path=off;

server {
    listen 80;
    server_name _;

    # Allow large file uploads (max 20MB images)
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Uploaded images cache (immutable)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 365d;
        add_header Cache-Control "public, immutable, no-transform";
        access_log off;
        try_files $uri @proxy;
    }

    # Static assets (Next.js _next/static)
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache static;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Main application proxy
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Don't cache HTML
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}
